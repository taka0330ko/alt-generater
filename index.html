<!doctype html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>taka-project</title>
  <link rel="stylesheet" href="./dist/style.css" />
</head>

<body class="background">
  <main class="app min-h-screen flex items-center justify-center" id="container">
    <!-- <h1>App Title</h1> -->
    <section class="mx-auto grid max-w-[900px] grid-cols-2 items-center gap-x-16">
      <div class="flex flex-col items-start">
        <textarea name="" id="text-area" placeholder="Text will be generated here."></textarea>
        <div>
          <button>Generate alt text</button>
          <button>Copy text</button>
        </div>
      </div>
      <div class="flex justify-center">
  <div class="relative h-[360px] w-[360px]">
    <span class="absolute bubble"></span>
    <span class="absolute bubble-2"></span>
    <span class="absolute bubble-3"></span>

    <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
      <input type="file" id="files">
      <div class="icon"></div>
      <p class="max-w-[220px] text-sm leading-relaxed">
        Click to select or Drag and Drop file here
      </p>
    </div>
  </div>
</div>
    </section>
  </main>
  <script type="module" src="./dist/main.js"></script>
</body>

</html>
