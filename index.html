<!doctype html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>taka-project</title>
  <link rel="stylesheet" href="./dist/style.css" />
</head>

<body class="background">
  <header class="fixed top-4 right-4 z-50">
       <div class="stage">
        <input class="switch-input" id="toggle-switch" type="checkbox" />
        <label class="switch" for="toggle-switch">
          <span class="track">
            <span class="knob"></span>
          </span>
        </label>
      </div>
    </header>
  <main class="app min-h-screen flex items-center justify-center relative" id="container">
    
    <!-- <h1>App Title</h1> -->
    <section class="mx-auto flex flex-col-reverse gap-16 md:gap-32 md:grid max-w-225 md:grid-cols-2 items-center px-4">
      <div class="flex flex-col items-start">
        <div class="textarea-wrapper relative w-full">
          <div id="loadingScreen" class="loadingView hidden">
            <span class="relative z-50 flex justify-center items-center h-40 md:h-60">Generating...</span>
          </div>
          <textarea name="" id="text-area" placeholder="Text will be generated here."></textarea>
        </div>
        <div class="pt-4 flex gap-4">
          <button id="generateBtn" class="generate-btn">Generate alt text</button>
          <button id="copyBtn" class="copy-btn">
            <span id="copyBtnLabel">Copy text</span>
            <svg id="copyIcon" class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="uploadArea" class="flex justify-center relative h-90 w-90 cursor-pointer group">
          <span class="absolute bubble group-hover:scale-105"></span>
          <span class="absolute bubble-2 group-hover:scale-105"></span>
          <span class="absolute bubble-3 group-hover:scale-105"></span>
          <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
            <form action="">
              <div class="flex flex-col justify-center items-center">
                <label class="cursor-pointer"><img id="uploadIcon" class="w-24" src="./assets/icons/upload.svg" alt=""></label>
                <input accept="image/*" type="file" id="imgInput" class="hidden">
                <figure id="figure" class="hidden">
                  <figcaption class="sr-only">Preview of the picture</figcaption>
                  <img src="" alt="" id="figureImage" class="max-w-50">
                </figure>
              </div>
            </form>
            <p class="text-sm leading-relaxed text-caption pt-4">
              Click to select or Drag and Drop file here
            </p>
          </div>
      </div>
    </section>
  </main>
  <script src="https://js.puter.com/v2/"></script>
  <script type="module" src="./dist/main.js"></script>
</body>

</html>
